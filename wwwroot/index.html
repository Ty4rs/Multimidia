<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Retrofuturista</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --bg-color: #050510;
            --neon-pink: #ff007f;
            --neon-blue: #00f0ff;
            --neon-purple: #9d00ff;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-color);
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none; /* Evita selecionar texto ao tocar na tela */
        }

        /* Top Bar - Relógio e Info */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 2px solid var(--neon-purple);
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.5);
            background: rgba(5, 5, 16, 0.8);
            z-index: 10;
        }

        .clock {
            font-size: 28px;
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
            font-weight: 700;
        }

        .status {
            font-size: 16px;
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
        }

        /* Main Grid - Aplicativos */
        .app-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 30px;
            align-content: center;
        }

        .app-btn {
            background: rgba(10, 10, 25, 0.6);
            border: 2px solid var(--neon-blue);
            border-radius: 15px;
            padding: 40px 20px;
            font-size: 24px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2) inset, 0 0 10px rgba(0, 240, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

            .app-btn:active {
                transform: scale(0.95);
                background: rgba(0, 240, 255, 0.2);
            }

            .app-btn.spotify {
                border-color: #1DB954;
                box-shadow: 0 0 15px rgba(29, 185, 84, 0.4);
                color: #1DB954;
            }

            .app-btn.youtube {
                border-color: #FF0000;
                box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
                color: #FF0000;
            }

            .app-btn.maps {
                border-color: var(--neon-pink);
                box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
                color: var(--neon-pink);
            }

            .app-btn.system {
                border-color: var(--neon-purple);
                box-shadow: 0 0 15px rgba(157, 0, 255, 0.4);
                color: var(--neon-purple);
            }

        /* Icones simulados com texto para simplificar, mas você pode usar FontAwesome depois */
        .icon {
            font-size: 40px;
        }

        /* Player Inferior */
        .bottom-player {
            padding: 20px 30px;
            border-top: 2px solid var(--neon-blue);
            background: rgba(5, 5, 16, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .now-playing {
            display: flex;
            flex-direction: column;
        }

        .track-title {
            font-size: 18px;
            color: white;
            margin-bottom: 5px;
        }

        .track-artist {
            font-size: 14px;
            color: var(--neon-blue);
        }

        .controls button {
            background: transparent;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            font-size: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            margin: 0 5px;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255, 0, 127, 0.4);
        }

            .controls button:active {
                background: var(--neon-pink);
                color: white;
            }

        /* Terminal de Retorno do C# */
        #console-output {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            display: none; /* Escondido por padrão */
        }
    </style>
</head>
<body>

    <!-- Barra Superior -->
    <div class="top-bar">
        <div class="status">CAR SYSTEM ONLINE // <span id="ram-info">Lendo RAM...</span></div>
        <div class="clock" id="clock">00:00</div>
    </div>

    <!-- Grade de Aplicativos -->
    <div class="app-grid">
        <button class="app-btn spotify" onclick="abrirApp('spotify')">
            <span class="icon">🎵</span>
            SPOTIFY
        </button>

        <button class="app-btn youtube" onclick="abrirApp('youtube')">
            <span class="icon">▶️</span>
            YOUTUBE
        </button>

        <button class="app-btn maps" onclick="abrirApp('maps')">
            <span class="icon">🗺️</span>
            NAVEGAÇÃO
        </button>

        <!-- O botão de sistema continua conectado à sua API C# -->
        <button class="app-btn system" onclick="enviarComandoSistema('free -h')">
            <span class="icon">⚙️</span>
            DIAGNÓSTICO
        </button>
    </div>

    <div id="console-output"></div>

    <!-- Player Multimídia Fixo Embaixo -->
    <div class="bottom-player">
        <div class="now-playing">
            <span class="track-title">Nenhuma mídia em reprodução</span>
            <span class="track-artist">Aguardando conexão...</span>
        </div>
        <div class="controls">
            <button onclick="controlarMidia('prev')">⏮</button>
            <button onclick="controlarMidia('play')">⏯</button>
            <button onclick="controlarMidia('next')">⏭</button>
        </div>
    </div>

    <script>
        // Atualiza o relógio digital da tela
        function atualizarRelogio() {
            const agora = new Date();
            const hora = String(agora.getHours()).padStart(2, '0');
            const minuto = String(agora.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hora}:${minuto}`;
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        // Função para simular a abertura de apps (No futuro, pode chamar links ou mudar telas)
        function abrirApp(app) {
            console.log("Abrindo " + app);
            const consoleDiv = document.getElementById('console-output');
            consoleDiv.style.display = 'block';
            consoleDiv.innerText = `Iniciando módulo: ${app.toUpperCase()}...`;
            setTimeout(() => { consoleDiv.style.display = 'none'; }, 2000);
        }

        // Função para os botões do player
        function controlarMidia(acao) {
            console.log("Comando de mídia: " + acao);
            // Aqui você poderá fazer uma chamada fetch() para o C# controlar o som do Linux via ALSA/PulseAudio
        }

        // Mantendo a sua comunicação com o back-end C# para diagnósticos
        async function enviarComandoSistema(cmd) {
            const painel = document.getElementById('console-output');
            painel.style.display = 'block';
            painel.innerText = ">_ PROCESSANDO COMANDO...";

            try {
                const resposta = await fetch('/api/executar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comando: cmd })
                });
                const dados = await resposta.json();
                painel.innerText = dados.retorno;
                document.getElementById('ram-info').innerText = "DIAGNÓSTICO CONCLUÍDO";
            } catch (erro) {
                painel.innerText = "FALHA NA CONEXÃO COM O KERNEL";
            }

            // Esconde o terminal após 5 segundos
            setTimeout(() => { painel.style.display = 'none'; }, 5000);
        }
    </script>

</body>
</html>
